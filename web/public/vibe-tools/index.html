<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VOICEGRAM</title>
    <style>
      :root {
        --ui-bg: rgba(18, 18, 18, 0.85);
        --ui-bg-hover: rgba(255, 255, 255, 0.08);
        --ui-bg-active: rgba(255, 255, 255, 0.12);
        --ui-border: rgba(255, 255, 255, 0.1);
        --ui-text: rgba(255, 255, 255, 0.55);
        --ui-text-bright: rgba(255, 255, 255, 0.85);
        --ui-accent: rgba(255, 255, 255, 0.9);
        --ui-font: "SF Mono", "JetBrains Mono", "Fira Code", "Menlo", monospace;
        --ui-radius: 3px;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #0a0a0a;
        color: var(--ui-text-bright);
        font-family: var(--ui-font);
      }

      #canvas-host {
        position: fixed;
        inset: 0;
        z-index: 0;
      }
      #canvas-host canvas {
        display: block;
      }

      .ui-layer {
        position: fixed;
        z-index: 10;
        pointer-events: none;
      }
      .ui-layer > * {
        pointer-events: auto;
      }

      .top-left {
        top: 16px;
        left: 16px;
        max-width: 300px;
      }
      .top-center {
        top: 16px;
        left: 50%;
        transform: translateX(-50%);
      }
      .top-right {
        top: 16px;
        right: 16px;
        display: flex;
        gap: 8px;
        align-items: center;
        background: var(--ui-bg);
        border: 1px solid var(--ui-border);
        border-radius: var(--ui-radius);
        padding: 4px 8px;
      }
      .bottom-center {
        bottom: 16px;
        left: 50%;
        transform: translateX(-50%);
        text-align: center;
      }

      .brand {
        position: fixed;
        bottom: 16px;
        right: 16px;
        z-index: 10;
        pointer-events: none;
        font-family: var(--ui-font);
        font-size: 9px;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        color: rgba(255, 255, 255, 0.2);
      }

      button {
        font-family: var(--ui-font);
        font-size: 11px;
        letter-spacing: 0.04em;
        text-transform: uppercase;
        color: var(--ui-text);
        background: transparent;
        border: 1px solid var(--ui-border);
        border-radius: var(--ui-radius);
        padding: 6px 12px;
        cursor: pointer;
        transition: color 0.15s ease, background 0.15s ease, border-color 0.15s ease;
      }

      button:hover {
        color: var(--ui-text-bright);
        background: var(--ui-bg-hover);
        border-color: rgba(255, 255, 255, 0.2);
      }

      button.active {
        color: var(--ui-accent);
        background: var(--ui-bg-active);
        border-color: rgba(255, 255, 255, 0.3);
      }

      .panel-source {
        display: flex;
        gap: 2px;
        align-items: center;
        background: var(--ui-bg);
        border: 1px solid var(--ui-border);
        border-radius: var(--ui-radius);
        padding: 2px;
      }

      .source-tabs {
        display: flex;
        gap: 0;
      }

      .tab-btn {
        border: none;
        border-radius: 2px;
        padding: 5px 10px;
        font-size: 10px;
      }

      .tab-btn.active {
        background: rgba(255, 255, 255, 0.12);
        color: var(--ui-text-bright);
      }

      .toggle-btn {
        border: none;
        border-left: 1px solid var(--ui-border);
        border-radius: 0;
        padding: 5px 10px;
        font-size: 10px;
        display: inline-flex;
        align-items: center;
        gap: 0;
      }

      .toggle-btn.on {
        color: var(--ui-text-bright);
        background: transparent;
      }

      .toggle-btn.on::before {
        content: "";
        display: inline-block;
        width: 5px;
        height: 5px;
        border-radius: 50%;
        background: #4ade80;
        margin-right: 5px;
        vertical-align: middle;
      }

      .sub-controls {
        margin-top: 6px;
        padding: 8px;
        background: var(--ui-bg);
        border: 1px solid var(--ui-border);
        border-radius: var(--ui-radius);
        width: 100%;
      }
      .sub-controls.hidden {
        display: none;
      }

      .file-row {
        margin-bottom: 0;
      }

      .playback-stack {
        display: flex;
        flex-direction: column;
        gap: 8px;
        margin-top: 8px;
      }

      #btn-play-pause {
        font-size: 10px;
        padding: 4px 10px;
        width: 100%;
      }

      #file-input {
        font-family: var(--ui-font);
        font-size: 10px;
        color: var(--ui-text);
        width: 100%;
      }

      #file-input::file-selector-button {
        font-family: var(--ui-font);
        font-size: 10px;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        color: var(--ui-text);
        background: transparent;
        border: 1px solid var(--ui-border);
        border-radius: var(--ui-radius);
        padding: 4px 8px;
        cursor: pointer;
        margin-right: 8px;
      }

      #file-input::file-selector-button:hover {
        color: var(--ui-text-bright);
        background: var(--ui-bg-hover);
        border-color: rgba(255, 255, 255, 0.2);
      }

      .sub-controls input[type="range"] {
        -webkit-appearance: none;
        appearance: none;
        width: 100%;
        height: 2px;
        background: rgba(255, 255, 255, 0.15);
        border-radius: 1px;
        outline: none;
        margin: 0;
      }

      .sub-controls input[type="range"]::-webkit-slider-thumb {
        -webkit-appearance: none;
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: var(--ui-text-bright);
        cursor: pointer;
      }

      .sub-controls input[type="range"]::-moz-range-track {
        height: 2px;
        background: rgba(255, 255, 255, 0.15);
        border-radius: 1px;
      }

      .sub-controls input[type="range"]::-moz-range-thumb {
        width: 8px;
        height: 8px;
        border: none;
        border-radius: 50%;
        background: var(--ui-text-bright);
        cursor: pointer;
      }

      #mic-device {
        width: 100%;
        padding: 6px 8px;
        border-radius: var(--ui-radius);
        border: 1px solid var(--ui-border);
        background: rgba(10, 10, 10, 0.6);
        color: var(--ui-text);
        font-family: var(--ui-font);
        font-size: 10px;
        letter-spacing: 0.03em;
      }

      .mode-selector {
        display: flex;
        gap: 0;
        background: var(--ui-bg);
        border: 1px solid var(--ui-border);
        border-radius: var(--ui-radius);
        padding: 2px;
      }

      .mode-btn {
        border: none;
        border-radius: 2px;
        padding: 6px 16px;
        font-size: 11px;
        letter-spacing: 0.06em;
      }

      .mode-btn.active {
        background: rgba(255, 255, 255, 0.15);
        color: var(--ui-accent);
      }

      .palette-dots {
        display: flex;
        gap: 4px;
        align-items: center;
        padding-right: 8px;
        border-right: 1px solid var(--ui-border);
      }

      button.pal-dot {
        width: 14px;
        height: 14px;
        border-radius: 50%;
        border: 1.5px solid rgba(255, 255, 255, 0.15);
        cursor: pointer;
        padding: 0;
        text-transform: none;
        letter-spacing: normal;
        font-size: 0;
        line-height: 0;
        transition: border-color 0.15s ease, transform 0.15s ease;
      }

      button.pal-dot:hover {
        border-color: rgba(255, 255, 255, 0.4);
        transform: scale(1.15);
        background: transparent;
      }

      button.pal-dot.active {
        border-color: rgba(255, 255, 255, 0.8);
        box-shadow: 0 0 0 2px rgba(255, 255, 255, 0.15);
        color: transparent;
        background: transparent;
      }

      #btn-clear,
      #btn-capture {
        border: none;
        font-size: 10px;
        padding: 4px 8px;
      }

      #btn-clear:hover,
      #btn-capture:hover {
        background: var(--ui-bg-hover);
      }

      #status-text {
        font-size: 9px;
        color: rgba(255, 255, 255, 0.3);
        letter-spacing: 0.03em;
        margin-top: 6px;
      }

      #debug-bands {
        font-family: var(--ui-font);
        font-size: 9px;
        letter-spacing: 0.02em;
        color: rgba(255, 255, 255, 0.3);
        padding: 6px 12px;
        background: var(--ui-bg);
        border: 1px solid var(--ui-border);
        border-radius: var(--ui-radius);
        font-variant-numeric: tabular-nums;
        max-width: 96vw;
      }

      #debug-bands.hidden {
        display: none;
      }
    </style>
  </head>
  <body>
    <div id="canvas-host"></div>

    <div class="ui-layer top-left">
      <div class="panel-source">
        <div class="source-tabs">
          <button id="btn-source-mic" class="tab-btn" type="button" data-source="mic">MIC</button>
          <button id="btn-source-file" class="tab-btn active" type="button" data-source="file">FILE</button>
        </div>
        <button id="btn-toggle" class="toggle-btn" type="button">OFF</button>
      </div>

      <div id="file-controls" class="sub-controls">
        <div class="file-row">
          <input id="file-input" type="file" accept="audio/*" />
        </div>
        <div class="playback-stack">
          <button id="btn-play-pause" type="button">PLAY</button>
          <input id="progress-bar" type="range" min="0" max="1" step="0.001" value="0" />
        </div>
      </div>

      <div id="mic-controls" class="sub-controls hidden">
        <select id="mic-device"></select>
      </div>

      <p id="status-text">LOADING</p>
    </div>

    <div class="ui-layer top-center">
      <div class="mode-selector">
        <button class="mode-btn" type="button" data-mode="shape">SHAPE</button>
        <button class="mode-btn active" type="button" data-mode="mosaic">MOSAIC</button>
      </div>
    </div>

    <div class="ui-layer top-right">
      <div class="palette-dots">
        <button class="pal-dot active" type="button" data-pal="mono" title="Mono" aria-label="Mono" style="background:#ffffff"></button>
        <button class="pal-dot" type="button" data-pal="neonFire" title="Fire" aria-label="Fire" style="background:#ff4422"></button>
        <button class="pal-dot" type="button" data-pal="ocean" title="Ocean" aria-label="Ocean" style="background:#4488ff"></button>
        <button class="pal-dot" type="button" data-pal="candy" title="Candy" aria-label="Candy" style="background:#ff66aa"></button>
        <button class="pal-dot" type="button" data-pal="acid" title="Acid" aria-label="Acid" style="background:#44ff66"></button>
        <button class="pal-dot" type="button" data-pal="vivid" title="Vivid" aria-label="Vivid" style="background:linear-gradient(135deg,#ff2222 50%,#4488ff 50%)"></button>
      </div>
      <button id="btn-clear" type="button">CLEAR</button>
      <button id="btn-capture" type="button" title="Save PNG">CAPTURE</button>
    </div>

    <div class="ui-layer bottom-center">
      <p id="debug-bands" class="hidden"></p>
    </div>

    <div class="brand">VOICEGRAM v1.5</div>

    <script src="https://cdn.jsdelivr.net/npm/p5@1.11.3/lib/p5.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/p5@1.11.3/lib/addons/p5.sound.min.js"></script>
    <script src="utils.js"></script>
    <script src="palettes.js"></script>
    <script src="audio.js"></script>
    <script src="renderer-shape.js"></script>
    <script src="renderer-mosaic.js"></script>
    <script src="ui.js"></script>
    <script src="sketch.js"></script>
  </body>
</html>
