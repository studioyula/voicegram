<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VIBE TOOLS — 소리 반응형 그래픽</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      html, body {
        width: 100%; height: 100%; overflow: hidden;
        background: #000; color: #fff;
        font-family: system-ui, -apple-system, sans-serif;
      }
      #canvas-host { position: fixed; inset: 0; z-index: 0; }
      #canvas-host canvas { display: block; }
      .ui-layer { position: fixed; z-index: 10; pointer-events: none; }
      .ui-layer > * { pointer-events: auto; }

      .top-left { top: 16px; left: 16px; max-width: 280px; }
      .top-center {
        top: 16px;
        left: 50%;
        transform: translateX(-50%);
      }
      .top-right {
        top: 16px;
        right: 16px;
        display: flex;
        gap: 10px;
        align-items: center;
      }
      .bottom-center {
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%);
        text-align: center;
      }

      .panel-source {
        display: flex;
        gap: 4px;
        align-items: center;
      }
      .source-tabs {
        display: flex;
        gap: 0;
      }
      .sub-controls {
        margin-top: 8px;
        width: 100%;
      }
      .sub-controls.hidden { display: none; }

      .file-row { margin-bottom: 6px; }
      .playback-row {
        display: flex;
        gap: 8px;
        align-items: center;
      }
      .playback-row input[type="range"] {
        flex: 1;
        min-width: 80px;
        accent-color: #ff8866;
      }

      .mode-selector {
        display: flex;
        gap: 4px;
      }
      .palette-dots {
        display: flex;
        gap: 6px;
        align-items: center;
      }
      .pal-dot {
        width: 20px;
        height: 20px;
        border-radius: 50%;
        border: 2px solid rgba(255,255,255,0.3);
        cursor: pointer;
        padding: 0;
      }
      .pal-dot.active {
        border-color: #fff;
        box-shadow: 0 0 6px rgba(255,255,255,0.5);
      }

      button, .tab-btn, .mode-btn {
        border: 1px solid rgba(255,255,255,0.25);
        background: rgba(0,0,0,0.6);
        color: #fff;
        padding: 6px 10px;
        border-radius: 8px;
        font-size: 12px;
        cursor: pointer;
        backdrop-filter: blur(8px);
      }
      button:hover, .tab-btn:hover, .mode-btn:hover {
        background: rgba(255,255,255,0.12);
      }
      button.active, .tab-btn.active, .mode-btn.active {
        background: rgba(255,120,80,0.35);
        border-color: #ffaa88;
      }
      .mode-btn.active {
        background: rgba(255,120,80,0.45);
        border-color: #ffaa88;
        font-weight: 600;
      }
      #btn-toggle.on {
        background: rgba(80,220,140,0.35);
        border-color: #88ffbb;
      }

      #mic-device {
        width: 100%;
        padding: 6px 8px;
        border-radius: 6px;
        border: 1px solid rgba(255,255,255,0.25);
        background: rgba(0,0,0,0.7);
        color: #fff;
        font-size: 12px;
      }
      #file-input { font-size: 12px; color: #ccc; max-width: 100%; }

      #debug-bands {
        font-size: 10px;
        padding: 8px 12px;
        background: rgba(0,0,0,0.5);
        border-radius: 8px;
        font-variant-numeric: tabular-nums;
        max-width: 96vw;
      }
      #debug-bands.hidden { display: none; }

      #status-text {
        font-size: 11px;
        color: rgba(255,255,255,0.5);
        margin-top: 6px;
      }
      .brand {
        position: fixed;
        bottom: 20px;
        right: 20px;
        z-index: 10;
        font-size: 11px;
        letter-spacing: 0.2em;
        color: rgba(255,255,255,0.35);
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <div id="canvas-host"></div>

    <!-- 상단 왼쪽: 입력 소스 -->
    <div class="ui-layer top-left">
      <div class="panel-source">
        <div class="source-tabs">
          <button id="btn-source-mic" class="tab-btn" type="button" data-source="mic">🎤 마이크</button>
          <button id="btn-source-file" class="tab-btn active" type="button" data-source="file">📁 파일</button>
        </div>
        <button id="btn-toggle" class="toggle-btn" type="button">OFF</button>
      </div>

      <div id="file-controls" class="sub-controls">
        <div class="file-row">
          <input id="file-input" type="file" accept="audio/*" />
        </div>
        <div class="playback-row">
          <button id="btn-play-pause" type="button">▶ 재생</button>
          <input id="progress-bar" type="range" min="0" max="1" step="0.001" value="0" />
        </div>
      </div>

      <div id="mic-controls" class="sub-controls hidden">
        <select id="mic-device"></select>
      </div>

      <p id="status-text">로딩 중…</p>
    </div>

    <!-- 상단 중앙: 렌더링 모드 -->
    <div class="ui-layer top-center">
      <div class="mode-selector">
        <button class="mode-btn active" type="button" data-mode="shape">Shape</button>
        <button class="mode-btn" type="button" data-mode="mosaic">Mosaic</button>
      </div>
    </div>

    <!-- 상단 오른쪽: 팔레트 + 액션 -->
    <div class="ui-layer top-right">
      <div class="palette-dots">
        <button class="pal-dot active" type="button" data-pal="mono" title="Mono" style="background:#ffffff"></button>
        <button class="pal-dot" type="button" data-pal="neonFire" title="Fire" style="background:#ff4422"></button>
        <button class="pal-dot" type="button" data-pal="ocean" title="Ocean" style="background:#4488ff"></button>
        <button class="pal-dot" type="button" data-pal="candy" title="Candy" style="background:#ff66aa"></button>
        <button class="pal-dot" type="button" data-pal="acid" title="Acid" style="background:#44ff66"></button>
        <button class="pal-dot" type="button" data-pal="vivid" title="Vivid" style="background:linear-gradient(135deg,#ff2222 50%,#4488ff 50%)"></button>
      </div>
      <button id="btn-clear" type="button">CLEAR</button>
      <button id="btn-capture" type="button" title="PNG 저장">📷</button>
    </div>

    <!-- 하단 중앙: 디버그 (기본 숨김, D키 토글) -->
    <div class="ui-layer bottom-center">
      <p id="debug-bands" class="hidden"></p>
    </div>

    <div class="brand">VIBE TOOLS v1.5</div>

    <script src="https://cdn.jsdelivr.net/npm/p5@1.11.3/lib/p5.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/p5@1.11.3/lib/addons/p5.sound.min.js"></script>
    <script src="utils.js"></script>
    <script src="palettes.js"></script>
    <script src="audio.js"></script>
    <script src="renderer-shape.js"></script>
    <script src="renderer-mosaic.js"></script>
    <script src="ui.js"></script>
    <script src="sketch.js"></script>
  </body>
</html>
