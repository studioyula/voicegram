<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VOICEGRAM</title>
    <style>
      :root {
        --bg: #f7f7f5;
        --surface: #ffffff;
        --ink: #111111;
        --ink-secondary: #5c5c5c;
        --ink-tertiary: #8a8a8a;
        --border: #e6e6e3;
        --border-strong: #d2d2ce;
        --fill-subtle: #f2f2f0;
        --fill-segment: #ececea;
        --shadow-sm: 0 1px 2px rgba(17, 17, 17, 0.04);
        --shadow-md: 0 8px 32px rgba(17, 17, 17, 0.06);
        --shadow-lg: 0 20px 60px rgba(17, 17, 17, 0.08);
        --sidebar-w: 300px;
        --topbar-h: 56px;
        --space-1: 4px;
        --space-2: 8px;
        --space-3: 12px;
        --space-4: 16px;
        --space-5: 20px;
        --space-6: 24px;
        --radius-sm: 8px;
        --radius-md: 12px;
        --radius-lg: 16px;
        --radius-full: 999px;
        --font-ui: "Helvetica Neue", "Apple SD Gothic Neo", "Pretendard", Arial, sans-serif;
        --font-mono: "SF Mono", "JetBrains Mono", "Fira Code", "Menlo", monospace;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: var(--bg);
        color: var(--ink);
        font-family: var(--font-ui);
        font-size: 13px;
        line-height: 1.4;
        -webkit-font-smoothing: antialiased;
      }

      #canvas-host {
        position: fixed;
        left: var(--space-6);
        right: calc(var(--sidebar-w) + var(--space-6) + var(--space-4));
        top: calc(var(--topbar-h) + var(--space-5));
        bottom: var(--space-6);
        z-index: 0;
        overflow: hidden;
        border: 1px solid var(--border);
        border-radius: var(--radius-lg);
        background: var(--surface);
        box-shadow: var(--shadow-md);
      }

      #canvas-host canvas {
        display: block;
      }

      .topbar,
      .controlbar,
      #debug-bands {
        backdrop-filter: blur(20px) saturate(1.1);
        -webkit-backdrop-filter: blur(20px) saturate(1.1);
      }

      .topbar {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        z-index: 10;
        display: flex;
        align-items: center;
        justify-content: space-between;
        height: var(--topbar-h);
        padding: 0 var(--space-6);
        border-bottom: 1px solid var(--border);
        background: rgba(255, 255, 255, 0.88);
      }

      .brand-logo {
        color: var(--ink);
        font-size: 15px;
        font-weight: 650;
        letter-spacing: -0.03em;
      }

      button,
      input,
      select {
        font-family: var(--font-ui);
      }

      button {
        min-height: 32px;
        padding: 0 var(--space-3);
        border: 1px solid var(--border);
        border-radius: var(--radius-sm);
        background: var(--surface);
        color: var(--ink-secondary);
        font-size: 12px;
        font-weight: 550;
        letter-spacing: -0.01em;
        cursor: pointer;
        transition: background 0.12s ease, border-color 0.12s ease, color 0.12s ease;
      }

      button:hover {
        background: var(--fill-subtle);
        border-color: var(--border-strong);
        color: var(--ink);
      }

      .primary-btn,
      #btn-play-pause {
        border-color: var(--ink);
        background: var(--ink);
        color: #fff;
      }

      .primary-btn:hover,
      #btn-play-pause:hover {
        background: #2a2a2a;
        border-color: #2a2a2a;
        color: #fff;
      }

      .canvas-actions {
        position: fixed;
        z-index: 11;
        display: flex;
        flex-wrap: wrap;
        align-items: stretch;
        justify-content: flex-end;
        gap: var(--space-2);
        right: calc(var(--sidebar-w) + var(--space-6) + var(--space-4));
        bottom: var(--space-6);
        max-width: calc(100vw - var(--sidebar-w) - var(--space-6) * 3 - var(--space-4));
        padding: var(--space-2);
        border: 1px solid var(--border);
        border-radius: var(--radius-md);
        background: rgba(255, 255, 255, 0.92);
        box-shadow: var(--shadow-md);
        backdrop-filter: blur(12px) saturate(1.05);
        -webkit-backdrop-filter: blur(12px) saturate(1.05);
        pointer-events: none;
      }

      .canvas-actions > * {
        pointer-events: auto;
      }

      #btn-record-video {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        min-height: 48px;
        padding: 8px 16px 8px 14px;
        border: 2px solid #b71c1c;
        border-radius: var(--radius-md);
        background: linear-gradient(165deg, #ff5252 0%, #d32f2f 55%, #c62828 100%);
        color: #fff;
        font-size: 12px;
        font-weight: 700;
        letter-spacing: -0.02em;
        line-height: 1.25;
        text-align: left;
        box-shadow:
          0 0 0 1px rgba(255, 255, 255, 0.12) inset,
          0 6px 20px rgba(198, 40, 40, 0.45);
      }

      #btn-record-video:hover {
        background: linear-gradient(165deg, #ff6e6e 0%, #e53935 55%, #d32f2f 100%);
        filter: brightness(1.04);
        border-color: #7f1010;
        color: #fff;
      }

      #btn-record-video .rec-dot {
        flex-shrink: 0;
        width: 12px;
        height: 12px;
        border-radius: 50%;
        background: #fff;
        box-shadow: 0 0 0 2px rgba(255, 255, 255, 0.35);
        animation: rec-dot-pulse 1.4s ease-in-out infinite;
      }

      #btn-record-video .rec-copy {
        display: flex;
        flex-direction: column;
        gap: 2px;
        min-width: 0;
      }

      #btn-record-video .rec-title {
        font-size: 13px;
        font-weight: 750;
        letter-spacing: -0.03em;
      }

      #btn-record-video .rec-hint {
        font-size: 10px;
        font-weight: 550;
        opacity: 0.92;
        letter-spacing: -0.01em;
      }

      #btn-record-video.recording {
        background: linear-gradient(165deg, #2d2d2d 0%, #1a1a1a 100%);
        border-color: #ef5350;
        color: #fff;
        box-shadow:
          0 0 0 1px rgba(239, 83, 80, 0.35) inset,
          0 0 0 3px rgba(239, 83, 80, 0.25),
          0 6px 24px rgba(0, 0, 0, 0.35);
        animation: record-pulse 1.1s ease-in-out infinite;
      }

      #btn-record-video.recording:hover {
        filter: brightness(1.08);
        color: #fff;
      }

      #btn-record-video.recording .rec-dot {
        border-radius: 2px;
        background: #ff1744;
        box-shadow: 0 0 10px rgba(255, 23, 68, 0.9);
        animation: rec-recording-blink 0.9s steps(2, end) infinite;
      }

      @keyframes rec-dot-pulse {
        0%,
        100% {
          transform: scale(1);
          opacity: 1;
        }
        50% {
          transform: scale(0.92);
          opacity: 0.85;
        }
      }

      @keyframes rec-recording-blink {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.45;
        }
      }

      @keyframes record-pulse {
        0%,
        100% {
          box-shadow:
            0 0 0 1px rgba(239, 83, 80, 0.35) inset,
            0 0 0 3px rgba(239, 83, 80, 0.22),
            0 6px 24px rgba(0, 0, 0, 0.35);
        }
        50% {
          box-shadow:
            0 0 0 1px rgba(239, 83, 80, 0.5) inset,
            0 0 0 5px rgba(239, 83, 80, 0.12),
            0 8px 28px rgba(0, 0, 0, 0.4);
        }
      }

      .controlbar {
        position: fixed;
        top: calc(var(--topbar-h) + var(--space-5));
        right: var(--space-6);
        bottom: var(--space-6);
        z-index: 10;
        width: var(--sidebar-w);
        display: flex;
        flex-direction: column;
        gap: var(--space-5);
        padding: var(--space-4);
        overflow: auto;
        border: 1px solid var(--border);
        border-radius: var(--radius-lg);
        background: rgba(255, 255, 255, 0.92);
        box-shadow: var(--shadow-md);
      }

      .control-section {
        display: grid;
        gap: var(--space-3);
        min-width: 0;
      }

      .visual-section {
        padding-top: var(--space-5);
        border-top: 1px solid var(--border);
      }

      .control-label {
        color: var(--ink-tertiary);
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 0.06em;
        text-transform: uppercase;
      }

      .source-controls,
      .visual-controls {
        display: flex;
        flex-direction: column;
        gap: var(--space-4);
        min-width: 0;
      }

      .source-tabs {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 3px;
        padding: 3px;
        border-radius: var(--radius-md);
        background: var(--fill-segment);
      }

      .tab-btn {
        min-height: 36px;
        border: 0;
        border-radius: 10px;
        background: transparent;
        color: var(--ink-tertiary);
        font-size: 13px;
        font-weight: 600;
        letter-spacing: -0.01em;
      }

      .tab-btn:hover {
        color: var(--ink-secondary);
        background: transparent;
      }

      .tab-btn.active {
        background: var(--surface);
        color: var(--ink);
        box-shadow: var(--shadow-sm);
      }

      .mode-selector {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(80px, 1fr));
        gap: var(--space-2);
      }

      .mode-btn {
        min-height: 36px;
        border: 1px solid var(--border);
        border-radius: var(--radius-sm);
        background: var(--surface);
        color: var(--ink-secondary);
        font-size: 12px;
        font-weight: 600;
        letter-spacing: -0.01em;
      }

      .mode-btn:hover {
        border-color: var(--border-strong);
        background: var(--fill-subtle);
      }

      .mode-btn.active {
        border-color: var(--ink);
        background: var(--ink);
        color: #fff;
      }

      .mode-btn.active:hover {
        background: #2a2a2a;
        border-color: #2a2a2a;
        color: #fff;
      }

      .analysis-control {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: var(--space-3);
        padding: var(--space-3) 0 0;
        border-top: 1px solid var(--border);
      }

      .analysis-control.hidden {
        display: none;
      }

      .analysis-label {
        color: var(--ink-secondary);
        font-size: 12px;
        font-weight: 550;
      }

      .toggle-btn {
        min-height: 28px;
        min-width: 52px;
        padding: 0 10px;
        font-size: 11px;
        font-weight: 600;
      }

      .toggle-btn.on {
        border-color: var(--ink);
        background: var(--ink);
        color: #fff;
      }

      .toggle-btn.on::before {
        content: "";
        display: inline-block;
        width: 5px;
        height: 5px;
        margin-right: 5px;
        border-radius: 50%;
        background: #6ee07a;
        vertical-align: 1px;
      }

      .input-hint,
      .file-status-text {
        color: var(--ink-tertiary);
        font-size: 11px;
        font-weight: 450;
        line-height: 1.35;
      }

      .sub-controls {
        display: grid;
        gap: var(--space-4);
        min-width: 0;
      }

      .sub-controls.hidden {
        display: none;
      }

      .file-row {
        display: flex;
        align-items: center;
        gap: var(--space-2);
        min-width: 0;
      }

      #file-input {
        position: absolute;
        width: 1px;
        height: 1px;
        opacity: 0;
        pointer-events: none;
      }

      .file-select-button {
        display: inline-flex;
        flex-shrink: 0;
        min-height: 28px;
        align-items: center;
        padding: 0 10px;
        border: 1px solid var(--border-strong);
        border-radius: var(--radius-sm);
        background: var(--fill-subtle);
        color: var(--ink-secondary);
        font-size: 11px;
        font-weight: 600;
        cursor: pointer;
        white-space: nowrap;
        transition: background 0.12s ease, border-color 0.12s ease, color 0.12s ease;
      }

      .file-select-button:hover {
        background: var(--surface);
        border-color: var(--ink-tertiary);
        color: var(--ink);
      }

      .file-status-text {
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .playback-stack {
        display: grid;
        grid-template-columns: 64px minmax(0, 1fr);
        align-items: center;
        gap: var(--space-2);
      }

      #btn-play-pause {
        min-width: 64px;
        min-height: 32px;
        font-size: 11px;
        font-weight: 650;
        letter-spacing: 0.04em;
      }

      input[type="range"] {
        -webkit-appearance: none;
        appearance: none;
        width: 100%;
        height: 3px;
        border-radius: var(--radius-full);
        background: var(--border);
        outline: none;
      }

      input[type="range"]::-webkit-slider-thumb {
        -webkit-appearance: none;
        width: 12px;
        height: 12px;
        border: 2px solid var(--surface);
        border-radius: 50%;
        background: var(--ink);
        cursor: pointer;
        box-shadow: var(--shadow-sm);
      }

      input[type="range"]::-moz-range-track {
        height: 3px;
        border-radius: var(--radius-full);
        background: var(--border);
      }

      input[type="range"]::-moz-range-thumb {
        width: 12px;
        height: 12px;
        border: 2px solid var(--surface);
        border-radius: 50%;
        background: var(--ink);
        cursor: pointer;
      }

      #mic-device {
        width: 100%;
        min-height: 32px;
        padding: 0 var(--space-3);
        border: 1px solid var(--border);
        border-radius: var(--radius-sm);
        background: var(--surface);
        color: var(--ink);
        font-size: 12px;
      }

      .palette-row {
        display: grid;
        gap: var(--space-2);
      }

      .palette-label {
        color: var(--ink-tertiary);
        font-size: 11px;
        font-weight: 550;
      }

      .palette-dots {
        display: flex;
        flex-wrap: wrap;
        gap: var(--space-2);
      }

      button.pal-dot {
        width: 20px;
        min-width: 20px;
        height: 20px;
        min-height: 20px;
        padding: 0;
        border: 1.5px solid rgba(17, 17, 17, 0.12);
        border-radius: 50%;
        color: transparent;
        font-size: 0;
        transition: transform 0.12s ease, box-shadow 0.12s ease;
      }

      button.pal-dot:hover {
        transform: scale(1.08);
        background: transparent;
      }

      button.pal-dot.active {
        border-color: var(--ink);
        box-shadow: 0 0 0 2px var(--surface), 0 0 0 3px var(--ink);
      }

      .bottom-center {
        position: fixed;
        left: var(--space-6);
        bottom: var(--space-5);
        z-index: 10;
        pointer-events: none;
      }

      #debug-bands {
        max-width: calc(100vw - 48px);
        padding: 6px 12px;
        border: 1px solid var(--border);
        border-radius: var(--radius-full);
        background: rgba(255, 255, 255, 0.9);
        color: var(--ink-tertiary);
        font-size: 10px;
        font-family: var(--font-mono);
        font-variant-numeric: tabular-nums;
        pointer-events: auto;
      }

      #debug-bands.hidden {
        display: none;
      }

      @media (max-width: 760px) {
        #canvas-host {
          top: calc(var(--topbar-h) + var(--space-3));
          left: var(--space-3);
          right: var(--space-3);
          bottom: 320px;
          border-radius: var(--radius-md);
        }

        .topbar {
          padding: 0 var(--space-4);
        }

        .controlbar {
          top: auto;
          left: var(--space-3);
          right: var(--space-3);
          bottom: var(--space-3);
          width: auto;
          max-height: 280px;
        }

        .visual-section {
          padding-top: var(--space-4);
        }

        .bottom-center {
          left: var(--space-4);
          right: var(--space-4);
          bottom: 300px;
        }

        .canvas-actions {
          right: var(--space-3);
          bottom: 300px;
          max-width: calc(100vw - var(--space-3) * 2);
        }
      }
    </style>
  </head>
  <body>
    <div id="canvas-host"></div>

    <header class="topbar" aria-label="Voicegram header">
      <div class="brand-logo">
        <span>VOICEGRAM</span>
      </div>
    </header>

    <div class="canvas-actions" role="toolbar" aria-label="Canvas capture and video recording">
      <button id="btn-clear" type="button">Clear</button>
      <button
        id="btn-record-video"
        type="button"
        title="캔버스를 동영상으로 녹화합니다 (MP4 또는 WebM)"
        aria-pressed="false"
      >
        <span class="rec-dot" aria-hidden="true"></span>
        <span class="rec-copy">
          <span id="btn-record-video-title" class="rec-title">영상 녹화</span>
          <span id="btn-record-video-hint" class="rec-hint">캔버스 → 동영상 파일 저장</span>
        </span>
      </button>
      <button id="btn-capture" class="primary-btn" type="button" title="현재 화면을 PNG로 저장">
        Capture
      </button>
    </div>

    <main class="controlbar" aria-label="Audio and visual controls">
      <section class="control-section source-section" aria-label="Input source controls">
        <div class="control-meta">
          <div class="control-label">Source</div>
        </div>
        <div class="source-controls">
          <div class="panel-source">
            <div class="source-tabs">
              <button id="btn-source-mic" class="tab-btn" type="button" data-source="mic">MIC</button>
              <button id="btn-source-file" class="tab-btn active" type="button" data-source="file">FILE</button>
            </div>
          </div>

          <div id="analysis-control" class="analysis-control hidden">
            <span class="analysis-label">소리 입력</span>
            <button id="btn-toggle" class="toggle-btn" type="button">OFF</button>
          </div>

          <div class="input-area">
            <div id="file-controls" class="sub-controls">
              <div class="file-row">
                <label class="file-select-button" for="file-input">파일 선택</label>
                <span id="file-label" class="file-status-text">파일을 선택한 뒤 PLAY를 누르세요</span>
                <input id="file-input" type="file" accept="audio/*" />
              </div>
              <div class="playback-stack">
                <button id="btn-play-pause" type="button">PLAY</button>
                <input id="progress-bar" type="range" min="0" max="1" step="0.001" value="0" />
              </div>
            </div>

            <div id="mic-controls" class="sub-controls hidden">
              <select id="mic-device"></select>
              <p id="status-text" class="input-hint">장치를 선택하고 ON을 켜세요</p>
            </div>
          </div>
        </div>
      </section>

      <section class="control-section visual-section" aria-label="Visual mode controls">
        <div class="control-meta">
          <div class="control-label">Visual</div>
        </div>
        <div class="visual-controls">
          <div class="mode-selector">
            <button class="mode-btn" type="button" data-mode="shape">SHAPE</button>
            <button class="mode-btn active" type="button" data-mode="mosaic">MOSAIC</button>
          </div>

          <div class="palette-row" id="shape-bg-row">
            <span class="palette-label">Background</span>
            <div class="palette-dots">
              <button
                class="pal-dot shape-bg-dot active"
                type="button"
                data-shape-bg="white"
                title="White"
                aria-label="White canvas"
                style="background: #ffffff; border: 1px solid #d8d8d4"
              ></button>
              <button
                class="pal-dot shape-bg-dot"
                type="button"
                data-shape-bg="black"
                title="Black"
                aria-label="Black canvas"
                style="background: #111111"
              ></button>
            </div>
          </div>
        </div>
      </section>
    </main>

    <div class="bottom-center">
      <p id="debug-bands" class="hidden"></p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/p5@1.11.3/lib/p5.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/p5@1.11.3/lib/addons/p5.sound.min.js"></script>
    <script src="utils.js"></script>
    <script src="poundstone_colors.js"></script>
    <script src="palettes.js"></script>
    <script src="audio.js"></script>
    <script src="shape-composition.js"></script>
    <script src="renderer-shape.js"></script>
    <script src="renderer-mosaic.js"></script>
    <script src="recorder.js"></script>
    <script src="ui.js"></script>
    <script src="sketch.js"></script>
  </body>
</html>
